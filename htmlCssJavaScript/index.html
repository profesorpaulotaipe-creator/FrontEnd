<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
    <title>Pagina 2.0</title>
</head>
<body>
    <nav class="nav-carrusel">
        <button onclick="anteriorImagen()">←</button><!-- alt + 27  -->
        <img id="imagenCarrusel" src="source/img/nakamas.jpg" alt="Imagen Carrusel">
        <button onclick="siguienteImagen()">→</button><!-- alt + 26  -->
    </nav>   

    <div id="menu">
        <div class="d-flex justify-content-between w-100 aling-items-center">
            <button class="hamburguesa btn btn-outline-dark" onclick="toogleMenu()">☰</button>
        </div>
        <div class="menu-opciones mt-3" id="menuOpciones">
            <button class="btn btn-secondary m-1">Formulario de contactos</button>
            <button class="btn btn-secondary m-1">Editar Contactos</button>
            <button class="btn btn-secondary m-1">Mostrar Section 1</button>
            <button class="btn btn-danger m-1">Eliminar Contactos</button>
        </div>
    </div>

    <section id="section2">
        <div class="contenido" id="contenido">
            <header id="header">
                <div class="contenido-interno">
                    <h3>Formulario de Contacto</h3>
                    <form id="formContacto">
                        <div class="mb-3">
                            <label for="">Nombre:</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="">Correo:</label>
                            <input type="email" id="correo" class="form-control" required>
                        </div>

                        <button class="btn btn-danger" type="submit">Guardar</button>
                    </form>
                    <div id="mensajeGuardado" class="mt-3 text-success"></div>
                </div>
            </header>

            <aside id="aside" class="oculto">
            </aside>

            <section id="section1" class="oculto">
            </section>

            <sectionid="section3" class="oculto">                
            </section>
        </div>
    </section>
    
</body>
</html>
